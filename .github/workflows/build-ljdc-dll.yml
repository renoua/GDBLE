name: Build DLL for ljdc

# Builds the Windows GDBLE DLL and pushes it directly to the private ljdc repo.
# Runs for free because this repo (GDBLE fork) is public.
#
# Prerequisites:
#   1. Create a GitHub PAT (classic) with scope "repo" at https://github.com/settings/tokens
#   2. Add it as a secret named LJDC_REPO_TOKEN in this repo's Settings → Secrets → Actions

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'vendor/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-ljdc-dll.yml'

env:
  CARGO_TERM_COLOR: always
  LJDC_REPO: https://x-access-token:${{ secrets.LJDC_REPO_TOKEN }}@github.com/renoua/ljdc.git

jobs:
  build-and-deploy:
    name: Build Windows DLL → push to ljdc
    runs-on: windows-latest

    steps:
      - name: Checkout GDBLE source
        uses: actions/checkout@v4

      - name: Setup Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-msvc-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-msvc-cargo-

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: windows-msvc-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-msvc-target-

      - name: Build release DLL
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Build debug DLL
        run: cargo build --target x86_64-pc-windows-msvc

      - name: Clone ljdc repo and deposit DLLs
        shell: bash
        run: |
          git clone --depth=1 "${{ env.LJDC_REPO }}" ljdc-repo
          mkdir -p ljdc-repo/addons/gdble_ljdc/bin

          cp target/x86_64-pc-windows-msvc/release/gdble_ljdc.dll \
             ljdc-repo/addons/gdble_ljdc/bin/gdble_ljdc.windows.template_release.x86_64.dll

          cp target/x86_64-pc-windows-msvc/debug/gdble_ljdc.dll \
             ljdc-repo/addons/gdble_ljdc/bin/gdble_ljdc.windows.template_debug.x86_64.dll

          echo "DLLs:"
          ls -lh ljdc-repo/addons/gdble_ljdc/bin/*.dll

      - name: Commit and push to ljdc
        shell: bash
        run: |
          cd ljdc-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add addons/gdble_ljdc/bin/*.dll
          if git diff --staged --quiet; then
            echo "DLLs inchangées — rien à committer."
          else
            git commit -m "build: DLL GDBLE WinRT (SetMaintainConnection patch)"
            git push
          fi
